# ─── HomeSchool Adventures - Nginx reverse proxy ────────────────────
# AVANT UTILISATION : remplacez VOTRE_DOMAINE.fr par votre vrai domaine
# Commande : sed -i 's/VOTRE_DOMAINE.fr/mondomaine.fr/g' nginx.conf

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name VOTRE_DOMAINE.fr;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name VOTRE_DOMAINE.fr;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/VOTRE_DOMAINE.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.fr/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # Proxy to Node.js app
    location / {
        proxy_pass http://homeschool-app:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://homeschool-app:3001;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
